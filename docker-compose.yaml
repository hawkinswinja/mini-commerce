name: m-commerce
services:

  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.142.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    # ports:
    #   - 4317:4317  # OTLP gRPC receiver
    expose:
      - "4317"  # OTLP gRPC receiver (from backend)
      - "4318"  # OTLP HTTP receiver (from frontend)
      # - "9411:9411"  # Zipkin receiver (optional)
      # - "8888:8888"  # Prometheus metrics (self-metrics)
    environment:
      - GOGC=80

  jaeger:
    image: jaegertracing/jaeger:2.12.0
    container_name: jaeger
    ports:
      - 16686:16686
    expose:
      - "4317"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    depends_on:
      - otel-collector

  frontend:
    image: hawkinswinja/m-commerce-frontend:${FRONTEND_IMAGE_TAG}
    ports:
      - 3000:80
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: "unless-stopped"
  
  backend: 
    image: hawkinswinja/m-commerce-backend:${BACKEND_IMAGE_TAG}
    command: "gunicorn minicommerce.wsgi:application -b 0.0.0.0:8000 --workers 3 --log-level warning --access-logfile - --error-logfile -"
    expose:
      - "8000"
    restart: "unless-stopped"
    volumes:
      - ./backend:/app
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG}
      - APP_ENV=${APP_ENV}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - AT_USERNAME=${AT_USERNAME}
      - AT_APIKEY=${AT_APIKEY}
      - GUNICORN_WORKERS=2
      - OIDC_RP_CLIENT_ID=${OIDC_RP_CLIENT_ID}
      - OIDC_RP_CLIENT_SECRET=${OIDC_RP_CLIENT_SECRET}
      - OIDC_OP_AUTHORIZATION_ENDPOINT=${OIDC_OP_AUTHORIZATION_ENDPOINT}
      - OIDC_OP_TOKEN_ENDPOINT=${OIDC_OP_TOKEN_ENDPOINT}
      - OIDC_OP_USER_ENDPOINT=${OIDC_OP_USER_ENDPOINT}
      - OIDC_OP_JWKS_ENDPOINT=${OIDC_OP_JWKS_ENDPOINT}
      - LOGIN_REDIRECT_URL=${LOGIN_REDIRECT_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=minicommerce_api
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
    depends_on:
      - migrations
      - otel-collector

  migrations:
    image: hawkinswinja/m-commerce-backend:${BACKEND_IMAGE_TAG}
    command: "python manage.py migrate"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=False
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - AT_USERNAME=${AT_USERNAME}
      - AT_APIKEY=${AT_APIKEY}
      - OIDC_RP_CLIENT_ID=${OIDC_RP_CLIENT_ID}
      - OIDC_RP_CLIENT_SECRET=${OIDC_RP_CLIENT_SECRET}
      - OIDC_OP_AUTHORIZATION_ENDPOINT=${OIDC_OP_AUTHORIZATION_ENDPOINT}
      - OIDC_OP_TOKEN_ENDPOINT=${OIDC_OP_TOKEN_ENDPOINT}
      - OIDC_OP_USER_ENDPOINT=${OIDC_OP_USER_ENDPOINT}
      - OIDC_OP_JWKS_ENDPOINT=${OIDC_OP_JWKS_ENDPOINT}
      - LOGIN_REDIRECT_URL=${LOGIN_REDIRECT_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=postgres     
      - POSTGRES_PORT=5432
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:alpine3.19
    expose:
    - 5432
    restart: "unless-stopped"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db:/var/lib/postgresql/data

volumes: 
  db:

